<!-- Dịch vụ -->
<section id="dich-vu">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Dịch vụ</h2>
                <h3 class="section-subheading text-muted">Những gì chúng tôi cung cấp.</h3>
            </div>
        </div>
        <div class="row text-center">
            {% moi dv trong du_lieu.dich_vu_agency %}
            <div class="col-md-4">
                <span class="fa-stack fa-4x">
                    <i class="fa fa-circle fa-stack-2x text-primary"></i>
                    <i class="fa fa-{{ dv.icon }} fa-stack-1x fa-inverse"></i>
                </span>
                <h4 class="service-heading">{{ dv.ten }}</h4>
                <p class="text-muted">{{ dv.mo_ta }}</p>
            </div>
            {% het %}
        </div>
    </div>
</section>
