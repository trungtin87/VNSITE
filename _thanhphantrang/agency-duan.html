<!-- Dự án (thay cho modal của bản Jekyll gốc: mỗi dự án có trang riêng /du-an/slug/) -->
<style>
.vn-anh-thay-the {
    height: 200px; display: flex; align-items: center; justify-content: center;
    background: #fed136; color: #333; font-weight: bold; text-align: center; padding: 1rem;
}
</style>
<section id="du-an" class="bg-light-gray">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Dự án</h2>
                <h3 class="section-subheading text-muted">Một số sản phẩm tiêu biểu.</h3>
            </div>
        </div>
        <div class="row">
            {% moi du_an trong tat_ca_du_an %}
            <div class="col-md-4 col-sm-6 portfolio-item">
                <a href="{{ du_an.url | duong_dan }}" class="portfolio-link">
                    <div class="portfolio-hover">
                        <div class="portfolio-hover-content">
                            <i class="fa fa-plus fa-3x"></i>
                        </div>
                    </div>
                    {% neu du_an.anh_dai_dien %}
                    <img src="{{ du_an.anh_dai_dien | duong_dan }}" class="img-responsive img-centered" alt="{{ du_an.tieu_de }}">
                    {% khac %}
                    <div class="vn-anh-thay-the">{{ du_an.tieu_de }}</div>
                    {% hetneu %}
                </a>
                <div class="portfolio-caption">
                    <h4>{{ du_an.tieu_de }}</h4>
                    <p class="text-muted">{{ du_an.mo_ta_ngan }}</p>
                </div>
            </div>
            {% het %}
        </div>
    </div>
</section>
