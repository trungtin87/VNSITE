<!-- Liên hệ -->
<style>
.vn-thongbao-gui { display: none; padding: 1rem; border-radius: 6px; margin-top: 1rem; }
.vn-thongbao-gui.hien { display: block; }
.vn-thongbao-gui.thanhcong { background: #d4edda; color: #155724; }
</style>
<section id="lien-he">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2 class="section-heading">Liên hệ</h2>
                <h3 class="section-subheading text-muted">Gửi lời nhắn cho chúng tôi.</h3>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12">
                {% neu cau_hinh.google_form.form_id %}
                <form id="vn-form-lien-he"
                      action="https://docs.google.com/forms/d/e/{{ cau_hinh.google_form.form_id }}/formResponse"
                      method="POST" target="vn-iframe-an">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <input type="text" class="form-control" placeholder="Họ tên *"
                                       name="{{ cau_hinh.google_form.entries.ho_ten }}" required>
                            </div>
                            <div class="form-group">
                                <input type="email" class="form-control" placeholder="Email *"
                                       name="{{ cau_hinh.google_form.entries.email }}" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" class="form-control" placeholder="Số điện thoại"
                                       name="{{ cau_hinh.google_form.entries.dien_thoai }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <textarea class="form-control" placeholder="Nội dung *"
                                          name="{{ cau_hinh.google_form.entries.noi_dung }}" required></textarea>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <div class="col-lg-12 text-center">
                            <button type="submit" class="btn btn-xl">Gửi</button>
                            <div id="vn-thongbao-gui" class="vn-thongbao-gui thanhcong">
                                Đã gửi thành công, cảm ơn bạn!
                            </div>
                        </div>
                    </div>
                </form>
                <iframe name="vn-iframe-an" style="display:none" id="vn-iframe-an"></iframe>
                <script>
                (function () {
                    var form = document.getElementById("vn-form-lien-he");
                    var iframe = document.getElementById("vn-iframe-an");
                    var thongBao = document.getElementById("vn-thongbao-gui");
                    var daGuiLan1 = false;
                    form.addEventListener("submit", function () {
                        daGuiLan1 = true;
                    });
                    iframe.addEventListener("load", function () {
                        if (daGuiLan1) {
                            thongBao.classList.add("hien");
                            form.reset();
                        }
                    });
                })();
                </script>
                {% khac %}
                <p class="text-center text-muted">
                    Chưa cấu hình <code>google_form</code> trong _cauhinhtrangweb.yml.
                    Chạy <code>python3 cong_cu/lay_ma_google_form.py "link-form-cua-ban"</code> để lấy mã rồi điền vào.
                </p>
                {% hetneu %}
            </div>
        </div>
    </div>
</section>
